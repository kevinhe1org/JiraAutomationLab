name: Create PR from Jira branch

on:
  create

permissions:
  contents: write
  pull-requests: write

jobs:
  jira-branch-to-pr:
    if: >
      github.ref_type == 'branch' &&
      startsWith(github.ref_name, format('{0}-', vars.JIRA_PROJECT_KEY))

    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      BASE_BRANCH: main

    steps:
      - name: Extract Jira issue key from branch name
        id: extract
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME}"

          if [[ "$branch_name" =~ ^(${JIRA_PROJECT_KEY}-[0-9]+)(-|$) ]]; then
            issue_key="${BASH_REMATCH[1]}"
            echo "issue_key=$issue_key" >> "$GITHUB_OUTPUT"
            echo "Matched Jira issue key: $issue_key"
          else
            echo "Branch name does not match expected Jira format for project ${JIRA_PROJECT_KEY}: ${branch_name}"
            exit 1
          fi

      - name: Resolve Jira field IDs
        id: jira_fields
        shell: bash
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -euo pipefail

          fields_file="$(mktemp)"

          status_code="$(
            curl -sS \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Accept: application/json" \
              -o "$fields_file" \
              -w "%{http_code}" \
              "${JIRA_BASE_URL}/rest/api/3/field"
          )"

          if [[ "$status_code" != "200" ]]; then
            echo "Failed to fetch Jira fields. HTTP ${status_code}"
            cat "$fields_file"
            exit 1
          fi

          source_ip_field_id="$(
            jq -r '.[] | select(.name == "Source IP") | .id' "$fields_file" | head -n1
          )"

          destinations_field_id="$(
            jq -r '.[] | select(.name == "Destinations") | .id' "$fields_file" | head -n1
          )"

          if [[ -z "${source_ip_field_id}" || "${source_ip_field_id}" == "null" ]]; then
            echo "Could not find Jira field named: Source IP"
            exit 1
          fi

          if [[ -z "${destinations_field_id}" || "${destinations_field_id}" == "null" ]]; then
            echo "Could not find Jira field named: Destinations"
            exit 1
          fi

          echo "source_ip_field_id=${source_ip_field_id}" >> "$GITHUB_OUTPUT"
          echo "destinations_field_id=${destinations_field_id}" >> "$GITHUB_OUTPUT"

      - name: Fetch Jira issue
        id: jira
        shell: bash
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -euo pipefail

          issue_key="${{ steps.extract.outputs.issue_key }}"
          source_ip_field_id="${{ steps.jira_fields.outputs.source_ip_field_id }}"
          destinations_field_id="${{ steps.jira_fields.outputs.destinations_field_id }}"
          response_file="$(mktemp)"

          status_code="$(
            curl -sS \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Accept: application/json" \
              -o "$response_file" \
              -w "%{http_code}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${issue_key}?fields=summary,description,${source_ip_field_id},${destinations_field_id}"
          )"

          if [[ "$status_code" != "200" ]]; then
            echo "Jira API call failed with HTTP ${status_code}"
            cat "$response_file"
            exit 1
          fi

          summary="$(jq -r '.fields.summary // ""' "$response_file")"

          description_text="$(
            jq -r '
              def flatten:
                if . == null then ""
                elif type == "string" then .
                elif type == "number" or type == "boolean" then tostring
                elif type == "array" then map(flatten) | map(select(. != "")) | join(", ")
                elif type == "object" then
                  if has("text") then .text
                  elif has("value") then .value
                  elif has("name") then .name
                  elif has("content") then (.content | flatten)
                  else ""
                  end
                else ""
                end;

              .fields.description | flatten
            ' "$response_file"
          )"

          source_ip_value="$(
            jq -r --arg field "$source_ip_field_id" '
              def flatten:
                if . == null then ""
                elif type == "string" then .
                elif type == "number" or type == "boolean" then tostring
                elif type == "array" then map(flatten) | map(select(. != "")) | join(", ")
                elif type == "object" then
                  if has("value") then .value
                  elif has("name") then .name
                  elif has("text") then .text
                  elif has("content") then (.content | flatten)
                  else tostring
                  end
                else ""
                end;

              .fields[$field] | flatten
            ' "$response_file"
          )"

          destinations_value="$(
            jq -r --arg field "$destinations_field_id" '
              def flatten:
                if . == null then ""
                elif type == "string" then .
                elif type == "number" or type == "boolean" then tostring
                elif type == "array" then map(flatten) | map(select(. != "")) | join(", ")
                elif type == "object" then
                  if has("value") then .value
                  elif has("name") then .name
                  elif has("text") then .text
                  elif has("content") then (.content | flatten)
                  else tostring
                  end
                else ""
                end;

              .fields[$field] | flatten
            ' "$response_file"
          )"

          {
            echo "issue_key=$issue_key"
            echo "summary<<EOF"
            echo "$summary"
            echo "EOF"
            echo "description<<EOF"
            echo "$description_text"
            echo "EOF"
            echo "source_ip<<EOF"
            echo "$source_ip_value"
            echo "EOF"
            echo "destinations<<EOF"
            echo "$destinations_value"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout new branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Ensure README exists
        shell: bash
        run: |
          [[ -f README.md ]] || touch README.md

      - name: Update README.md with Jira details
        shell: bash
        run: |
          set -euo pipefail

          cat <<EOF >> README.md

            
            client.address=${{ steps.jira.outputs.source_ip }} url.host.exact=${{ steps.jira.outputs.destinations }}
          EOF

      - name: Commit and push README change
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          git commit -m "docs: add Jira issue details for ${{ steps.jira.outputs.issue_key }}"
          git push origin "${GITHUB_REF_NAME}"

      - name: Check whether PR already exists
        id: prcheck
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          pr_count="$(gh pr list \
            --head "${GITHUB_REF_NAME}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number \
            --jq 'length')"

          echo "count=${pr_count}" >> "$GITHUB_OUTPUT"

      - name: Create pull request to main
        if: steps.prcheck.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${GITHUB_REF_NAME}" \
            --title "${{ steps.jira.outputs.issue_key }}: ${{ steps.jira.outputs.summary }}" \
            --body "$(cat <<EOF
          This PR was auto-created from branch \`${GITHUB_REF_NAME}\`.

          **Jira issue:** ${{ steps.jira.outputs.issue_key }}
          **Summary:** ${{ steps.jira.outputs.summary }}

          README.md was updated with the Jira description content.
          EOF
          )"

      - name: Write job summary
        shell: bash
        run: |
          {
            echo "## Jira branch workflow"
            echo
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Issue: \`${{ steps.jira.outputs.issue_key }}\`"
            echo "- Summary: ${{ steps.jira.outputs.summary }}"
            echo "- Base branch: \`${BASE_BRANCH}\`"
          } >> "$GITHUB_STEP_SUMMARY"